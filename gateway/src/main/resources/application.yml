server:
  port: 8090

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # Ruta para el Servicio A
        - id: msv-citas
          uri: lb://msv-citas
          predicates:
            - Path=/api/citas/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true